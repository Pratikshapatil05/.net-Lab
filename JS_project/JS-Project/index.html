<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop It - Smart Grocery</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="top-bar">
   Free delivery on orders above ₹299 &nbsp;|&nbsp;  <strong></strong> 
</div>

<div class="header">
  <h2>🛒 Shop It</h2>
  <input type="text" id="search" placeholder="Search groceries..." oninput="searchProduct()">
  <button class="history-btn" onclick="openHistory()">📋 Orders</button>
</div>

<!-- Coupon Banner -->
<div class="coupon-banner" id="couponBanner">
  <span>🎁 Coupon applied: <strong id="appliedCouponLabel"></strong></span>
  <button onclick="removeCoupon()">✕</button>
</div>

<div class="categories">
  <button class="cat-btn active" onclick="filterCategory('all', this)">All</button>
  <button class="cat-btn" onclick="filterCategory('fruit', this)">🍎 Fruits</button>
  <button class="cat-btn" onclick="filterCategory('vegetable', this)">🥦 Vegetables</button>
  <button class="cat-btn" onclick="filterCategory('dairy', this)">🥛 Dairy</button>
  <button class="cat-btn" onclick="filterCategory('grains', this)">🌾 Grains</button>
</div>

<div id="product-list" class="products"></div>

<div class="cart-bar" onclick="openCart()">
  🛒 <span id="cart-count">0</span> items &nbsp;|&nbsp; ₹<span id="cart-total">0</span>
  <span class="cart-arrow">View Cart ›</span>
</div>

<!-- ===== CART MODAL ===== -->
<div id="cart-modal" class="modal-overlay" onclick="overlayClose(event,'cart-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <h2>🛒 Your Cart</h2>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <!-- Coupon -->
    <div class="coupon-section">
      <input type="text" id="couponInput" placeholder="Enter coupon code (FRESH10 / SAVE20 / FLAT50)">
      <button onclick="applyCoupon()">Apply</button>
    </div>
    <p id="coupon-msg" class="coupon-msg"></p>

    <!-- Delivery Address -->
    <div class="section-title">📍 Delivery Address</div>
    <div class="address-section">
      <input type="text" id="addrName" placeholder="Full Name">
      <input type="text" id="addrPhone" placeholder="Phone Number">
      <textarea id="addrText" placeholder="House no, Street, Area, City..."></textarea>
    </div>

    <!-- Delivery Slot -->
    <div class="section-title">🕐 Choose Delivery Slot</div>
    <div class="slots">
      <label><input type="radio" name="slot" value="Express (10 mins)" checked> ⚡ Express (10 mins)</label>
      <label><input type="radio" name="slot" value="Morning 9-11 AM"> 🌅 Morning 9–11 AM</label>
      <label><input type="radio" name="slot" value="Afternoon 1-3 PM"> ☀️ Afternoon 1–3 PM</label>
      <label><input type="radio" name="slot" value="Evening 6-8 PM"> 🌇 Evening 6–8 PM</label>
    </div>

    <!-- Cart Items -->
    <div class="section-title">🧺 Items</div>
    <ul id="cart-items"></ul>
    <h3 id="total"></h3>
    <h4 id="discount-line" class="discount-line"></h4>
    <h3 id="final-total"></h3>

    <button class="checkout-btn" onclick="checkout()">Place Order 🎉</button>
  </div>
</div>

<!-- ===== ORDER HISTORY MODAL ===== -->
<div id="history-modal" class="modal-overlay" onclick="overlayClose(event,'history-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <h2>📋 Order History</h2>
      <button class="close-btn" onclick="closeHistory()">✕</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- ===== REVIEW MODAL ===== -->
<div id="review-modal" class="modal-overlay" onclick="overlayClose(event,'review-modal')">
  <div class="modal-box">
    <div class="modal-header">
      <h2>⭐ Rate & Review</h2>
      <button class="close-btn" onclick="closeReview()">✕</button>
    </div>
    <p id="review-product-name" style="font-weight:700;font-size:1.1em;margin-bottom:8px;"></p>
    <div class="star-row" id="starRow"></div>
    <textarea id="reviewText" placeholder="Write your review (optional)..." rows="3"></textarea>
    <button class="checkout-btn" onclick="submitReview()">Submit Review</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
